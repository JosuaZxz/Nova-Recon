id: ghost-env-hunter

info:
  name: Deep Environment Backup Exposure
  author: Sniper-Predator
  severity: high
  description: Mengintai file konfigurasi dan backup yang luput dari template publik dan WAF.
  tags: exposure,config,backup,custom

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.dev"
      - "{{BaseURL}}/api/.env"
      - "{{BaseURL}}/config/.env"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/backup.sql.gz"
      - "{{BaseURL}}/.git/config"

    headers:
      # Bypass WAF dasar dengan Cache-Control dan header dinamis
      Cache-Control: "max-age=0"
      X-Forwarded-For: "127.0.0.1"
      X-Originating-IP: "127.0.0.1"
      X-Custom-IP-Authorization: "127.0.0.1"

    matchers-condition: and
    matchers:
      - type: word
        words:
          - "DB_PASSWORD"
          - "AWS_ACCESS_KEY"
          - "API_KEY"
          - "JWT_SECRET"
          - "STRIPE_KEY"
          - "[core]"
        condition: or

      - type: status
        status:
          - 200

      - type: word
        words:
          - "<html>"
          - "<!DOCTYPE html>"
        negative: true
