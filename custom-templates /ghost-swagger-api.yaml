id: ghost-swagger-api-leak

info:
  name: Unauthenticated API Documentation Leak
  author: Sniper-Predator
  severity: high
  description: Mengunduh peta blueprint API internal (Swagger/OpenAPI).
  tags: exposure,api,swagger,openapi,custom

requests:
  - method: GET
    path:
      - "{{BaseURL}}/swagger.json"
      - "{{BaseURL}}/api-docs"
      - "{{BaseURL}}/v3/api-docs"
      - "{{BaseURL}}/openapi.json"
      - "{{BaseURL}}/api/swagger.json"
    headers:
      Accept: "application/json"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "swagger"
          - "openapi"
          - "paths"
        condition: and
      # ANTI-HTML TRAP: API blueprint berbentuk JSON/YAML, BUKAN HTML frontend.
      - type: word
        words:
          - "<html"
          - "<!doctype"
          - "<body"
        condition: or
        negative: true
