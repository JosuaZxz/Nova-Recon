name: Automation Recon (24/7)

on:
  schedule:
  - cron: '0 * * * *'
  workflow_dispatch: # Ini yang bikin tombol "Run Workflow" tetap ada

jobs:
  recon-job:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        sniper_id: [1, 2, 3, 4, 5] # Cukup 1 mesin untuk testing
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Cache Seen URLs
        uses: actions/cache@v3
        with:
          path: .seen_urls
          key: seen-urls-cache-${{ github.run_id }}
          restore-keys: |
            seen-urls-cache-

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Install Tools (Failsafe Mode)
        timeout-minutes: 15
        run: |
          sudo apt-get update && sudo apt-get install -y google-chrome-stable libnss3 libgbm-dev dnsutils python3-pip
          pip3 install uro
          install_go_tool() {
                      if [ ! -f ~/go/bin/$1 ]; then
                        for i in 1 2 3; do
                          echo "Mencoba mengunduh $1 (Percobaan $i)..."
                          go install -v $2@latest && break || sleep 5
                        done
                      fi
                   } 
          install_go_tool subfinder github.com/projectdiscovery/subfinder/v2/cmd/subfinder
          install_go_tool httpx github.com/projectdiscovery/httpx/cmd/httpx
          install_go_tool nuclei github.com/projectdiscovery/nuclei/v3/cmd/nuclei
          install_go_tool katana github.com/projectdiscovery/katana/cmd/katana
          install_go_tool hakrawler github.com/hakluke/hakrawler
          install_go_tool assetfinder github.com/tomnomnom/assetfinder
          install_go_tool dnsx github.com/projectdiscovery/dnsx/cmd/dnsx
          install_go_tool cf-check github.com/dwisiswant0/cf-check
          install_go_tool alterx github.com/projectdiscovery/alterx/cmd/alterx
          install_go_tool waybackurls github.com/tomnomnom/waybackurls
          install_go_tool anew github.com/tomnomnom/anew
          echo "$HOME/go/bin" >> $GITHUB_PATH
          /home/runner/go/bin/nuclei -ut -ud /home/runner/nuclei-templates
          
      - name: Run Predator Recon
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          H1_USERNAME: ${{ secrets.H1_USERNAME }}
          H1_API_KEY: ${{ secrets.H1_API_KEY }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CRIT: ${{ secrets.TELEGRAM_CRITICAL_ID }}
          TG_GEN: ${{ secrets.TELEGRAM_GENERAL_ID }}
          TG_DATA: ${{ secrets.TELEGRAM_DATA_ID }}
          KATANA_CHROME_PATH: /usr/bin/google-chrome
        run: |

          # --- [ SETUP TRUSTED RESOLVERS ] ---
          # Menambah cadangan agar tidak kena blokir/limit DNS publik
          echo "1.1.1.1" > resolvers.txt
          echo "8.8.8.8" >> resolvers.txt
          echo "9.9.9.9" >> resolvers.txt
          echo "1.0.0.1" >> resolvers.txt
          echo "8.8.4.4" >> resolvers.txt
          echo "208.67.222.222" >> resolvers.txt
          
          # 1. SETUP NOTIF CONFIG
          echo "telegram:" > notify-config.yaml
          echo "  - id: \"p1_p2_alerts\"" >> notify-config.yaml
          echo "    telegram_apikey: \"$TG_TOKEN\"" >> notify-config.yaml
          echo "    telegram_chatid: \"$TG_CRIT\"" >> notify-config.yaml
          echo "    format: \"{{data}}\"" >> notify-config.yaml

          # 2. ANTI-COLLISION DELAY
          SLEEP_TIME=$(( (${{ matrix.sniper_id }} - 1) * 40 ))
          echo "⏳ Sniper ${{ matrix.sniper_id }} preparing hyper-speed tools..."
          sleep $SLEEP_TIME

          # --- FUNCTION UNTUK TIMESTAMP ---
          log_step() { echo "--- [ $(date +'%H:%M:%S') ] $1 ---"; }

          # 1. LOGIKA MASTER SNIPER (Otomatis Ambil File dari Folder Targets)
          # List semua file .txt di folder targets, abaikan test_target.txt
          ls targets/*.txt | grep -v "test_target.txt" > targets_list.tmp
          TOTAL_TARGETS=$(wc -l < targets_list.tmp)
          
          RUN_OFFSET=$(( (${{ github.run_number }} - 1) * 5 ))
          TARGET_INDEX=$(( (RUN_OFFSET + ${{ matrix.sniper_id }} - 1) % TOTAL_TARGETS + 1 ))

          # Ambil path file target (misal: targets/adobe.txt)
          target_path=$(sed -n "${TARGET_INDEX}p" targets_list.tmp)
          
          # Ambil nama perusahaannya saja untuk nama folder (misal: adobe)
          program_name=$(basename "$target_path" .txt)

          # 2. PERSIAPAN TEMPUR
          log_step "🎯 Sniper ${{ matrix.sniper_id }} Engaging: $program_name (Target #$TARGET_INDEX dari $TOTAL_TARGETS)"
          mkdir -p "data/$program_name"
          touch "data/$program_name/passive.txt" "data/$program_name/permutations.tmp"
          touch .seen_urls

          # STEP 1: HYBRID DISCOVERY (PASSIVE + ACTIVE PERMUTATION)
          log_step "STEP 1: Hybrid Discovery (Passive + Active)..."
          START_TIME=$(date +%s)
          
          # 1a. Passive Discovery (Dengan Limit Waktu)
          timeout 10m subfinder -dL "$target_path" -all -silent -o "data/$program_name/passive.txt" > /dev/null 2>&1 || true
          timeout 5m assetfinder --subs-only < "$target_path" >> "data/$program_name/passive.txt" 2>/dev/null || true
          
          # [+] SANITASI 1: Hapus karakter wildcard (*.) yang merusak HTTPX dan Nuclei
          sed -i 's/^\*\.//g' "data/$program_name/passive.txt" 2>/dev/null || true
          
          sort -u "data/$program_name/passive.txt" -o "data/$program_name/passive.txt"

          # 1b. Smart Permutation (AlterX) - Terkontrol agar tidak Blackhole
          # Batasi input 500, batasi waktu 5 menit, dan potong output maksimal 50.000 tebakan saja!
          [ -s "data/$program_name/passive.txt" ] && timeout 5m bash -c "head -n 500 data/$program_name/passive.txt | alterx -silent | head -n 50000 > data/$program_name/permutations.tmp" 2>/dev/null || true

          # 1c. DNS Resolution + IP Extraction (Dengan Limit Waktu)
          timeout 15m bash -c "cat data/$program_name/passive.txt data/$program_name/permutations.tmp | dnsx -silent -r resolvers.txt -a -resp-only -o data/$program_name/all_ips.txt" > /dev/null 2>&1 || true

          # --- [ STEP 1.5: ORIGIN IP DISCOVERY - STABLE ] ---
          log_step "STEP 1.5: Hunting Origin IPs..."
          sort -u "data/$program_name/all_ips.txt" > "data/$program_name/ips_unique.tmp"
          < "data/$program_name/ips_unique.tmp" cf-check -cf > "data/$program_name/cf_only.txt" 2>/dev/null || true
          
          if [ -s "data/$program_name/cf_only.txt" ]; then
            # FIX: Gunakan -m 500 menggantikan pipe head agar terhindar dari Broken Pipe
            grep -v -F -f "data/$program_name/cf_only.txt" -m 500 "data/$program_name/ips_unique.tmp" > "data/$program_name/origin_ips.txt" 2>/dev/null || true
          else
            head -n 500 "data/$program_name/ips_unique.tmp" > "data/$program_name/origin_ips.txt" || true
          fi
                
          # ---[ THE DELTA MONITOR: MENGISOLASI TARGET BARU (HANYA SUBDOMAIN) ] ---
          mkdir -p .known_targets
          touch ".known_targets/${program_name}.txt"
          
          # 1. Filter HANYA subdomain baru (Abaikan IP karena Cloudflare IP selalu berotasi)
          cat "data/$program_name/passive.txt" | sort -u | anew ".known_targets/${program_name}.txt" > "data/$program_name/new_subdomains.txt" || true
          
          # [+] SANITASI 2: Buang IP Lokal/Private (127.0.0.1, 10.x, 172.16-31.x, 192.168.x) agar mesin tidak menembak diri sendiri
          sed -i -E '/^(127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[0-1])\.)/d' "data/$program_name/origin_ips.txt" 2>/dev/null || true
          
          # 2. Gabungkan subdomain BARU dengan Origin IP segar hari ini
          { cat "data/$program_name/new_subdomains.txt" "data/$program_name/origin_ips.txt" | sort -u | head -n 3000 > "data/$program_name/subdomains.txt"; } 2>/dev/null || true
          
          log_step "Origin Hunter finished. Found $(wc -l < data/$program_name/origin_ips.txt) naked IPs."
          log_step "Total targets for probing: $(wc -l < data/$program_name/subdomains.txt)"
          
          # PENGAMAN: Pastikan file selalu ada
          touch "data/$program_name/subdomains.txt"
          
          END_TIME=$(date +%s)
          log_step "Discovery finished in $((END_TIME - START_TIME)) seconds. Found $(wc -l < data/$program_name/subdomains.txt) live subdomains."
          if [ -s "data/$program_name/subdomains.txt" ]; then
            # ---[ STEP 2: HTTPX SWEET SPOT + REDIRECT FOLLOWER ] ---
                log_step "STEP 2: HTTPX Probing..."
                START_TIME=$(date +%s)
                
                shuf "data/$program_name/subdomains.txt" -o "data/$program_name/shuffled.txt"

                # ESKALASI 1: DEEP PORT SCANNING (Mencari Panel Internal/Dev)
                timeout 55m httpx -l "data/$program_name/shuffled.txt" \
                  -p 80,443,8080,8443,3000,5000,8000,8001,9000,9200 \
                  -silent -ip -td -mc 200,301,302,401,403,405 \
                  -t 100 -rl 80 -timeout 3 -retries 0 -follow-host-redirects \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -o "data/$program_name/active_hosts.txt" > /dev/null 2>&1 || true

                # [ FIX HUBSPOT ]: Jika HTTPX gagal/diblokir WAF, ambil paksa dari list subdomain agar tidak skip!
                if [ ! -s "data/$program_name/active_hosts.txt" ]; then
                    head -n 1000 "data/$program_name/shuffled.txt" > "data/$program_name/active_hosts.txt"
                fi

                END_TIME=$(date +%s)
                log_step "HTTPX finished in $((END_TIME - START_TIME)) seconds."
          
            if [ -s "data/$program_name/active_hosts.txt" ]; then
                # ---[STEP 3: DEEP SIGHT 3.5 - SMART REDUCTION] ---
                echo "[+] Step 3: Mining Endpoints..."
                log_step "STEP 3: Endpoint Mining..."
                START_TIME=$(date +%s)
                awk '{print $1}' data/$program_name/active_hosts.txt | sort -u > data/$program_name/active_urls_clean.tmp
                sed 's|http[s]*://||g' data/$program_name/active_urls_clean.tmp | cut -d'/' -f1 | sort -u > data/$program_name/domains_only.txt
                
                # FIX 1: SMART CHUNKING (Wayback 1500, Katana 150)
                head -n 1500 data/$program_name/active_urls_clean.tmp > data/$program_name/wayback_brawl.tmp
                head -n 150 data/$program_name/active_urls_clean.tmp > data/$program_name/katana_brawl.tmp
                
                timeout 5m bash -c "cat data/$program_name/wayback_brawl.tmp | waybackurls > data/$program_name/urls_wayback.txt" > /dev/null 2>&1 || true
                timeout 5m bash -c "cat data/$program_name/wayback_brawl.tmp | hakrawler -subs > data/$program_name/urls_hak.txt" > /dev/null 2>&1 || true
                
                # Katana (Depth 2)
                timeout 10m katana -list data/$program_name/katana_brawl.tmp -system-chrome -headless -no-sandbox -jc -kf all -d 2 -silent -o data/$program_name/urls_katana.txt > /dev/null 2>&1 || true
                
                # GABUNGKAN
                cat data/$program_name/urls_wayback.txt data/$program_name/urls_hak.txt data/$program_name/urls_katana.txt | grep -v "localhost" | sort -u > data/$program_name/all_endpoints.txt
                END_TIME=$(date +%s)
                log_step "Mining finished in $((END_TIME - START_TIME)) seconds."
                
                # --- SMART FILTER (JURUS URO) ---
                echo "[+] Reducing noise with URO..."
                grep -iE '\.js|\.php|\.aspx|\.jsp|\.json|\/api\/|\?|=' data/$program_name/all_endpoints.txt > data/$program_name/pre_uro.txt || cp data/$program_name/all_endpoints.txt data/$program_name/pre_uro.txt
                cat data/$program_name/pre_uro.txt | uro > data/$program_name/filtered_endpoints.txt 2>/dev/null || cp data/$program_name/pre_uro.txt data/$program_name/filtered_endpoints.txt
                echo "✅ Done. Targets filtered from $(wc -l < data/$program_name/all_endpoints.txt) to $(wc -l < data/$program_name/filtered_endpoints.txt)"

                # --- [ LOGIKA PEMBUAT HIGH PRIORITY TARGETS ] ---
                log_step "STEP 3.5: Sanitizing Endpoints..."
                grep -iE "\?|\=|\.php|\.jsp|\.aspx|\.asp|\.json|\.xml|\.env|\.yaml|\.yml|\/api\/|\/v[0-9]\/|\/graphql|\/admin|\/internal|\/metrics|\/users|\/auth|\/login|\/config" data/$program_name/filtered_endpoints.txt | \
                grep -ivE "\.jpg|\.jpeg|\.png|\.gif|\.css|\.woff|\.woff2|\.svg|\.pdf|\.ico|\.ttf|\.eot" > data/$program_name/high_priority_targets.txt || true
                cat data/$program_name/active_hosts.txt >> data/$program_name/high_priority_targets.txt
                sort -u -o data/$program_name/high_priority_targets.txt data/$program_name/high_priority_targets.txt
                [ ! -s "data/$program_name/high_priority_targets.txt" ] && cp data/$program_name/filtered_endpoints.txt data/$program_name/high_priority_targets.txt
                log_step "Sanitization finished. High priority targets: $(wc -l < data/$program_name/high_priority_targets.txt)"

                # [+] INJEKSI STRICT SCOPE ANNIHILATOR (ANTI-TWITTER)
                > "data/$program_name/inscope.tmp"
                while read -r root_domain; do
                  root_domain=$(echo "$root_domain" | tr -d '[:space:]') [ -z "$root_domain" ] && continue
                  grep -iE "^https?://([a-zA-Z0-9.-]+\.)?${root_domain}(:[0-9]+)?(/|$)" "data/$program_name/high_priority_targets.txt" >> "data/$program_name/inscope.tmp" || true
                done < "$target_path"
                sort -u -o "data/$program_name/high_priority_targets.txt" "data/$program_name/inscope.tmp"
                
                # --- [GELOMBANG 1: REALITY CHECK BLITZ] ---
                log_step "STEP 4: Gelombang 1 - Critical Blitz..."
                START_TIME=$(date +%s)

                # 1. AMBIL URL MURNI (TANPA TAG CLOUDFLARE)
                cat "data/$program_name/active_urls_clean.tmp" | sort -u > "data/$program_name/mass_targets_raw.tmp"
                
                # 2. STRICT SCOPE FILTER (MENCEGAH NYASAR KE JPMORGAN DLL)
                > "data/$program_name/mass_targets.txt"
                while read -r root_domain; do
                  root_domain=$(echo "$root_domain" | tr -d '[:space:]')
                  [ -z "$root_domain" ] && continue
                  grep -iE "^https?://([a-zA-Z0-9.-]+\.)?${root_domain}(:[0-9]+)?(/|$)" "data/$program_name/mass_targets_raw.tmp" >> "data/$program_name/mass_targets.txt" || true
                done < "$target_path"
                
                # [+] SELAMATKAN NAKED IP AGAR TIDAK TERBUANG OLEH FILTER
                grep -iE "^https?://[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+" "data/$program_name/mass_targets_raw.tmp" >> "data/$program_name/mass_targets.txt" || true
                sort -u -o "data/$program_name/mass_targets.txt" "data/$program_name/mass_targets.txt"
                
                # [FAILSAFE]: Jika filter kosong, pastikan ambil dari URL MURNI
                [ ! -s "data/$program_name/mass_targets.txt" ] && cp "data/$program_name/active_urls_clean.tmp" "data/$program_name/mass_targets.txt"

                # 3. SMART CURATION (Membuat nuclei_targets.txt)
                grep -iE "dev|stg|test|admin|api|v1|v2|sandbox|internal|corp|beta" "data/$program_name/mass_targets.txt" > "data/$program_name/nuclei_targets.txt" || true
                CURRENT_NUC=$(wc -l < "data/$program_name/nuclei_targets.txt")
                if [ "$CURRENT_NUC" -lt 300 ]; then
                    grep -ivE "dev|stg|test|admin|api|v1|v2|sandbox|internal|corp|beta" "data/$program_name/mass_targets.txt" | shuf -n $((300 - CURRENT_NUC)) >> "data/$program_name/nuclei_targets.txt" || true
                fi

                # 4. FINAL CHAMBER: THE GHOST SWARM (DEEP URL INVASION)
                # BUKAN HANYA AKAR! Kita masukkan Deep URL karena 28 peluru kita sudah ANTI-HTML Catch-All!
                cat "data/$program_name/mass_targets.txt" "data/$program_name/high_priority_targets.txt" | sort -u | shuf -n 5000 > "data/$program_name/nuclei_targets_g1.txt"

                # [+] TAKTIK TROJAN HORSE V4 (GOD MODE: THE SEEKER)
                mkdir -p /home/runner/nuclei-templates/SILVER_BULLETS
                # Cari paksa file ghost-*.yaml dari akar hardisk server dan copy ke laras senapan!
                find /home/runner/work -type f -name "ghost-*.yam*" -exec cp {} /home/runner/nuclei-templates/SILVER_BULLETS/ \; 2>/dev/null || true
                ls -la /home/runner/nuclei-templates/SILVER_BULLETS/

                # THE DELTA SNIPER SCOPE: Karena target adalah ASET BARU, kita scan SEMUANYA tanpa dipotong.
                # THE SILVER BULLET HUNTER (CUSTOM P1/P2 MODE):
                # Fokus direktori mematikan: AWS, Azure, GCP, RCE, SSRF dan Takeover. WAF tidak akan curiga.
                timeout 60m nuclei -l "data/$program_name/nuclei_targets_g1.txt" \
                  -t /home/runner/nuclei-templates/SILVER_BULLETS/ \
                  -nmhe -c 30 -rl 100 -bs 5 -retries 1 -mhe 15 -timeout 10 -no-color -stats \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -H "Accept-Encoding: gzip, deflate" \
                  -jsonl -o "data/$program_name/nuclei_standard.json" || true

                END_TIME=$(date +%s)
                log_step "Gelombang 1 finished in $((END_TIME - START_TIME)) seconds."

                # ---[GELOMBANG 1.7: THE CVE ANNIHILATOR (ZERO-DAY HUNTER)] ---
                log_step "STEP 4.7: Gelombang 1.7 - Zero-Day CVE Hunting..."
                START_TIME=$(date +%s)
                
                # Memburu celah kritis dunia (CVE terbaru) yang belum sempat di-patch oleh Raksasa Tier-1
                timeout 45m nuclei -l "data/$program_name/nuclei_targets_g1.txt" \
                  -t /home/runner/nuclei-templates/http/cves/ \
                  -tags kev,cve2024,cve2025,cve2026 \
                  -severity critical,high \
                  -nmhe -c 30 -rl 100 -bs 5 -retries 1 -mhe 15 -timeout 8 -no-color -stats \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -H "Accept-Encoding: gzip, deflate" \
                  -jsonl -o "data/$program_name/nuclei_cves.json" || true
                  
                END_TIME=$(date +%s)
                log_step "Gelombang 1.7 finished in $((END_TIME - START_TIME)) seconds."

                # ---[GELOMBANG 1.5: THE PARAMETER ASSASSIN (SQLi, LFI, SSRF)] ---
                log_step "STEP 4.5: Gelombang 1.5 - Parameter Fuzzing..."
                START_TIME=$(date +%s)
                
                # OPTIMASI: Hajar 500 URL berparameter (Bukan 50 lagi!)
                grep "=" "data/$program_name/high_priority_targets.txt" | shuf -n 500 > "data/$program_name/param_targets.txt" || true
                if [ -s "data/$program_name/param_targets.txt" ]; then
                    timeout 45m nuclei -l "data/$program_name/param_targets.txt" \
                      -t /home/runner/nuclei-templates/http/vulnerabilities/ \
                      -t /home/runner/nuclei-templates/http/cves/ \
                      -tags sqli,lfi,ssrf,rce \
                      -nmhe -c 30 -rl 100 -bs 5 -retries 1 -mhe 15 -timeout 8 -no-color -stats \
                      -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                      -H "Accept-Encoding: gzip, deflate" \
                      -jsonl -o "data/$program_name/nuclei_params.json" || true
                fi
                
                END_TIME=$(date +%s)
                log_step "Gelombang 1.5 finished in $((END_TIME - START_TIME)) seconds."

                # ---[GELOMBANG 2: SURGICAL HEADLESS SECRETS] ---
                log_step "STEP 5: Gelombang 2 - Surgical Headless..."
                START_TIME=$(date +%s)

                # OPTIMASI: Naikkan ke 50 Target untuk membongkar DOM XSS & Takeover
                shuf -n 50 "data/$program_name/high_priority_targets.txt" -o "data/$program_name/headless_targets.txt"

                timeout 60m nuclei -l "data/$program_name/headless_targets.txt" \
                  -t /home/runner/nuclei-templates -severity critical,high,medium \
                  -tags headless,takeover,cve2024,cve2025,cve2026,workflow,xss,fuzzing,token,keys,credential \
                  -exclude-tags info,swagger,postman,docs -exclude-severity low,info \
                  -nmhe -c 5 -rl 25 -bs 3 -retries 1 -mhe 15 -timeout 10 -headless -system-chrome -no-color -stats \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -jsonl -o "data/$program_name/nuclei_headless.json" || true

                cat "data/$program_name/nuclei_standard.json" "data/$program_name/nuclei_headless.json" > "data/$program_name/nuclei_results.json" 2>/dev/null || true

                END_TIME=$(date +%s)
                log_step "Gelombang 2 finished in $((END_TIME - START_TIME)) seconds."

                # ---[STEP 5.5: DEEP JS SECRETS MINING (THE OP WEAPON)] ---
                log_step "STEP 5.5: Deep JS Secrets Mining..."
                START_TIME=$(date +%s)
                
                # Ekstrak 500 file Javascript tersembunyi
                grep -iE "\.js$" "data/$program_name/all_endpoints.txt" | shuf -n 500 > "data/$program_name/js_targets.txt" || true
                if [ -s "data/$program_name/js_targets.txt" ]; then
                    timeout 30m nuclei -l "data/$program_name/js_targets.txt" \
                      -t /home/runner/nuclei-templates/http/exposures/tokens/ \
                      -c 30 -rl 150 -bs 10 -nmhe -retries 2 -mhe 15 -no-color \
                      -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                      -jsonl -o "data/$program_name/nuclei_js.json" || true
                fi
                
                END_TIME=$(date +%s)
                log_step "JS Mining finished in $((END_TIME - START_TIME)) seconds."
                
                # ---[STEP 6: AI ANALYSIS] ---
                log_step "STEP 6: AI Triage processing..."
                
                # Gabungkan hasil (Standard + CVEs + Params + Headless + JS OP Weapon)
                cat "data/$program_name/nuclei_standard.json" "data/$program_name/nuclei_cves.json" "data/$program_name/nuclei_params.json" "data/$program_name/nuclei_headless.json" "data/$program_name/nuclei_js.json" > "data/$program_name/nuclei_results.json" 2>/dev/null || true

                # JALANKAN AI HANYA JIKA ADA HASIL (Surgical Efficiency)
                if [ -s "data/$program_name/nuclei_results.json" ]; then
                  echo "[+] Findings detected! Invoking Grandmaster AI..."
                  PROGRAM_NAME=$program_name python3 scripts/validate.py || true
                else
                  echo "[-] No findings in this session. Skipping AI Triage."
                fi
                
                # STEP 7: SULTAN NOTIFIKASI
                if [ -d "data/$program_name/alerts/high" ]; then
                  for f in data/$program_name/alerts/high/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(grep "^# " "$f" | head -n 1 | sed 's/# //g' | cut -c1-60)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_CRIT" \
                      -F document=@"$f" \
                      -F caption="🚨 [$program_name] FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                if [ -d "data/$program_name/alerts/low" ]; then
                  for f in data/$program_name/alerts/low/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(grep "^# " "$f" | head -n 1 | sed 's/# //g' | cut -c1-60)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_GEN" \
                      -F document=@"$f" \
                      -F caption="⚠️ [$program_name] FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                zip -qj "${program_name}_FULL_DATA.zip" data/$program_name/*.txt data/$program_name/*.json .seen_urls || true
                curl -s -F chat_id="$TG_DATA" -F document=@"${program_name}_FULL_DATA.zip" -F caption="📦 DATABASE: $program_name" "https://api.telegram.org/bot$TG_TOKEN/sendDocument" > /dev/null 2>&1
            fi
          fi

          # Hapus folder data setelah dikirim agar penyimpanan GitHub tetap lega
                rm -rf "data/$program_name"

      - name: Sync Database (Safe & Immortal)
        run: |
          git config --local user.email "bot@sniper-recon.ai"
          git config --local user.name "Recon-Sniper-Bot"
          
          # 1. Ambil perubahan dan commit lokal (Termasuk Ingatan Delta Monitor)
          git add .seen_urls .known_targets/
          git commit -m "database: update memory and logs [skip ci]" || echo "No changes"

          # 2. Loop Sync agar tidak tabrakan
          for i in {1..10}; do
            git pull origin main --rebase || git rebase --abort
            
            if [ -f .seen_urls ]; then
              sort -u .seen_urls -o .seen_urls
            fi
            
            git add .seen_urls
            git commit --amend --no-edit || echo "Nothing to amend"
            
            if git push origin main; then
              echo "✅ Database Synced Successfully!"
              break
            else
              echo "🔄 Collision detected, retrying in 15s..."
              sleep 15
            fi
          done
