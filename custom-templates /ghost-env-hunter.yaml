id: ghost-env-hunter

info:
  name: Deep Environment Backup Exposure
  author: Sniper-Predator
  severity: high
  description: Mengintai file konfigurasi dan backup yang luput dari template publik dan WAF.
  tags: exposure,config,backup,custom

requests:
  - method: GET
    path:
      - "{{BaseURL}}/.env.staging"
      - "{{BaseURL}}/.env.local"
      - "{{BaseURL}}/.env.backup"
      - "{{BaseURL}}/.env.dev"
      - "{{BaseURL}}/api/.env"
      - "{{BaseURL}}/config/.env"
      - "{{BaseURL}}/.env.old"
      - "{{BaseURL}}/docker-compose.yml"
      - "{{BaseURL}}/backup.sql.gz"

    headers:
      Cache-Control: "max-age=0"
      X-Forwarded-For: "127.0.0.1"
      X-Originating-IP: "127.0.0.1"

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "DB_PASSWORD="
          - "AWS_ACCESS_KEY_ID="
          - "APP_ENV="
        condition: or
      # ANTI-HTML TRAP: Mencegah WAF / Catch-All membohongi Nuclei
      - type: word
        words:
          - "<html"
          - "<!doctype"
          - "<body"
        condition: or
        negative: true
