name: Automation Recon (24/7)

on:
  schedule:
  - cron: '0 * * * *'
  workflow_dispatch: # Ini yang bikin tombol "Run Workflow" tetap ada

jobs:
  recon-job:
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        sniper_id: [1, 2, 3, 4, 5] # Cukup 1 mesin untuk testing
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Cache Seen URLs
        uses: actions/cache@v3
        with:
          path: .seen_urls
          key: seen-urls-cache-${{ github.run_id }}
          restore-keys: |
            seen-urls-cache-

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '>=1.20'

      - name: Install Tools (Failsafe Mode)
        run: |
          sudo apt-get update && sudo apt-get install -y google-chrome-stable libnss3 libgbm-dev dnsutils python3-pip
          pip3 install uro
          install_go_tool() {
            [ -f ~/go/bin/$1 ] || go install -v $2@latest
          }
          install_go_tool subfinder github.com/projectdiscovery/subfinder/v2/cmd/subfinder
          install_go_tool httpx github.com/projectdiscovery/httpx/cmd/httpx
          install_go_tool nuclei github.com/projectdiscovery/nuclei/v3/cmd/nuclei
          install_go_tool katana github.com/projectdiscovery/katana/cmd/katana
          install_go_tool hakrawler github.com/hakluke/hakrawler
          install_go_tool assetfinder github.com/tomnomnom/assetfinder
          install_go_tool dnsx github.com/projectdiscovery/dnsx/cmd/dnsx
          install_go_tool alterx github.com/projectdiscovery/alterx/cmd/alterx
          install_go_tool waybackurls github.com/tomnomnom/waybackurls
          install_go_tool anew github.com/tomnomnom/anew
          echo "$HOME/go/bin" >> $GITHUB_PATH
          /home/runner/go/bin/nuclei -ut -ud /home/runner/nuclei-templates
          
      - name: Run Predator Recon
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          H1_USERNAME: ${{ secrets.H1_USERNAME }}
          H1_API_KEY: ${{ secrets.H1_API_KEY }}
          TG_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TG_CRIT: ${{ secrets.TELEGRAM_CRITICAL_ID }}
          TG_GEN: ${{ secrets.TELEGRAM_GENERAL_ID }}
          TG_DATA: ${{ secrets.TELEGRAM_DATA_ID }}
          KATANA_CHROME_PATH: /usr/bin/google-chrome
        run: |
          # 1. SETUP NOTIF CONFIG
          echo "telegram:" > notify-config.yaml
          echo "  - id: \"p1_p2_alerts\"" >> notify-config.yaml
          echo "    telegram_apikey: \"$TG_TOKEN\"" >> notify-config.yaml
          echo "    telegram_chatid: \"$TG_CRIT\"" >> notify-config.yaml
          echo "    format: \"{{data}}\"" >> notify-config.yaml

          # 2. ANTI-COLLISION DELAY
          SLEEP_TIME=$(( (${{ matrix.sniper_id }} - 1) * 40 ))
          echo "⏳ Sniper ${{ matrix.sniper_id }} preparing hyper-speed tools..."
          sleep $SLEEP_TIME

          # --- FUNCTION UNTUK TIMESTAMP ---
          log_step() { echo "--- [ $(date +'%H:%M:%S') ] $1 ---"; }

          # 1. LOGIKA MASTER SNIPER (Otomatis Ambil File dari Folder Targets)
          # List semua file .txt di folder targets, abaikan test_target.txt
          ls targets/*.txt | grep -v "test_target.txt" > targets_list.tmp
          TOTAL_TARGETS=$(wc -l < targets_list.tmp)
          
          RUN_OFFSET=$(( (${{ github.run_number }} - 1) * 5 ))
          TARGET_INDEX=$(( (RUN_OFFSET + ${{ matrix.sniper_id }} - 1) % TOTAL_TARGETS + 1 ))

          # Ambil path file target (misal: targets/adobe.txt)
          target_path=$(sed -n "${TARGET_INDEX}p" targets_list.tmp)
          
          # Ambil nama perusahaannya saja untuk nama folder (misal: adobe)
          program_name=$(basename "$target_path" .txt)

          # 2. PERSIAPAN TEMPUR
          log_step "🎯 Sniper ${{ matrix.sniper_id }} Engaging: $program_name (Target #$TARGET_INDEX dari $TOTAL_TARGETS)"
          mkdir -p "data/$program_name"
          touch .seen_urls

          # STEP 1: HYBRID DISCOVERY (PASSIVE + ACTIVE PERMUTATION)
          log_step "STEP 1: Hybrid Discovery (Passive + Active)..."
          START_TIME=$(date +%s)
          
          # 1a. Passive Discovery (Existing)
          subfinder -dL "$target_path" -all -silent -o "data/$program_name/passive.txt" > /dev/null 2>&1 || true
          assetfinder --subs-only < "$target_path" >> "data/$program_name/passive.txt" 2>/dev/null || true
          sort -u "data/$program_name/passive.txt" -o "data/$program_name/passive.txt"

          # 1b. Smart Permutation (AlterX) - Menebak subdomain baru berdasarkan pola yang ada
          # Kita batasi agar tidak meledak (Surgical Mode)
          head -n 100 "data/$program_name/passive.txt" | alterx -silent > "data/$program_name/permutations.tmp" || true

          # 1c. DNS Resolution (Dnsx) - Cek mana yang beneran hidup dari ribuan tebakan
          # Menggunakan DNS publik tercepat
          cat "data/$program_name/passive.txt" "data/$program_name/permutations.tmp" | \
          dnsx -silent -retry 3 -t 100 -o "data/$program_name/subdomains.txt" > /dev/null 2>&1 || true
          
          END_TIME=$(date +%s)
          log_step "Discovery finished in $((END_TIME - START_TIME)) seconds. Found $(wc -l < data/$program_name/subdomains.txt) live subdomains."
          if [ -s "data/$program_name/subdomains.txt" ]; then
            # --- [ UPDATE STEP 2: SWEET SPOT PROBING (RL 25) ] ---
                log_step "STEP 2: HTTPX Probing..."
                START_TIME=$(date +%s)

                # 1. Timeout 45m (Jaminan tuntas untuk 12rb+ domain)
                # 2. RL 25 & Threads 50 (Angka paling aman & sopan)
                timeout 45m httpx -l "data/$program_name/subdomains.txt" \
                  -silent -ip -td -mc 200,301,302,401,403,405 \
                  -t 50 -rl 25 -retries 2 \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -o "data/$program_name/active_hosts.txt" > /dev/null 2>&1 || true

                END_TIME=$(date +%s)
                log_step "HTTPX finished in $((END_TIME - START_TIME)) seconds."
          
            if [ -s "data/$program_name/active_hosts.txt" ]; then
                # --- [STEP 3: DEEP SIGHT 3.5 - SMART REDUCTION] ---
                echo "[+] Step 3: Mining Endpoints..."
                log_step "STEP 3: Endpoint Mining..."
                START_TIME=$(date +%s)
                awk '{print $1}' data/$program_name/active_hosts.txt | sort -u > data/$program_name/active_urls_clean.tmp
                sed 's|http[s]*://||g' data/$program_name/active_urls_clean.tmp | cut -d'/' -f1 | sort -u > data/$program_name/domains_only.txt
                
                # Mining (Dipersingkat waktunya agar tidak kena Ban)
                timeout 5m bash -c "cat data/$program_name/domains_only.txt | waybackurls > data/$program_name/urls_wayback.txt" > /dev/null 2>&1 || true
                timeout 5m bash -c "cat data/$program_name/active_urls_clean.tmp | hakrawler -subs > data/$program_name/urls_hak.txt" > /dev/null 2>&1 | true
                
                # Katana (Sedikit lebih santai - Depth 2)
                timeout 10m katana -list data/$program_name/active_urls_clean.tmp -system-chrome -headless -no-sandbox -jc -kf all -d 2 -silent -o data/$program_name/urls_katana.txt > /dev/null 2>&1 || true
                
                # GABUNGKAN
                cat data/$program_name/urls_wayback.txt data/$program_name/urls_hak.txt data/$program_name/urls_katana.txt | grep -v "localhost" | sort -u > data/$program_name/all_endpoints.txt
                END_TIME=$(date +%s)
                log_step "Mining finished in $((END_TIME - START_TIME)) seconds."
                
                # --- SMART FILTER (JURUS URO) ---
                echo "[+] Reducing noise with URO..."
                # 1. Filter ekstensi menarik dulu
                grep -iE '\.js|\.php|\.aspx|\.jsp|\.json|\/api\/|\?|=' data/$program_name/all_endpoints.txt > data/$program_name/pre_uro.txt || cp data/$program_name/all_endpoints.txt data/$program_name/pre_uro.txt
                
                # 2. Pangkas parameter duplikat dengan Uro
                # Tambahkan '|| true' dan fallback cp jika uro gagal/not found
                cat data/$program_name/pre_uro.txt | uro > data/$program_name/filtered_endpoints.txt 2>/dev/null || cp data/$program_name/pre_uro.txt data/$program_name/filtered_endpoints.txt
                
                echo "✅ Done. Targets filtered from $(wc -l < data/$program_name/all_endpoints.txt) to $(wc -l < data/$program_name/filtered_endpoints.txt)"

                # --- [GELOMBANG 1: THE CRITICAL BLITZ (SURE-KILL)] ---
                log_step "STEP 4: Gelombang 1 - Critical Blitz (28k Sweep)..."
                START_TIME=$(date +%s)

                # Scan SEMUA subdomain tapi HANYA peluru Critical (RCE, SQLi, SSRF, LFI)
                timeout 60m nuclei -l "data/$program_name/subdomains.txt" \
                  -t /home/runner/nuclei-templates -severity critical,high \
                  -tags rce,sqli,ssrf,lfi,cve2024,cve2025 \
                  -exclude-tags info -exclude-severity low,info,medium \
                  -nmhe -rl 15 -bs 5 -retries 2 -no-color -silent \
                  -interactsh-server oast.pro \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -jsonl -o "data/$program_name/nuclei_standard.json" > /dev/null 2>&1 || true

                END_TIME=$(date +%s)
                log_step "Gelombang 1 finished in $((END_TIME - START_TIME)) seconds."

                # --- [GELOMBANG 2: SURGICAL HEADLESS (THE PRECISION)] ---
                log_step "STEP 5: Gelombang 2 - Surgical Headless (Deep Scan)..."
                START_TIME=$(date +%s)

                # Bedah target High Priority pake browser (Headless)
                timeout 60m nuclei -l "data/$program_name/high_priority_targets.txt" \
                  -t /home/runner/nuclei-templates -severity critical,high,medium \
                  -as -tags takeover,cve2024,cve2025,fuzzing,dast,workflow,token,keys,credential \
                  -exclude-tags info -exclude-severity low,info \
                  -nmhe -rl 5 -bs 2 -headless -no-color -silent \
                  -interactsh-server oast.pro \
                  -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36" \
                  -jsonl -o "data/$program_name/nuclei_headless.json" > /dev/null 2>&1 || true

                # GABUNGKAN HASIL UNTUK AI
                cat "data/$program_name/nuclei_standard.json" "data/$program_name/nuclei_headless.json" > "data/$program_name/nuclei_results.json" 2>/dev/null || true

                END_TIME=$(date +%s)
                log_step "Gelombang 2 finished in $((END_TIME - START_TIME)) seconds."

                # --- [STEP 6: AI ANALYSIS] ---
                echo "[+] Step 6: Grandmaster AI Triage processing..."
                log_step "STEP 6: AI Triage processing..."
                # Hapus > /dev/null agar kita bisa lihat log error AI jika ada masalah
                PROGRAM_NAME=$program_name python3 scripts/validate.py || true
                
                # STEP 7: SULTAN NOTIFIKASI
                if [ -d "data/$program_name/alerts/high" ]; then
                  for f in data/$program_name/alerts/high/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(grep "^# " "$f" | head -n 1 | sed 's/# //g' | cut -c1-60)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_CRIT" \
                      -F document=@"$f" \
                      -F caption="🚨 [$program_name] FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                if [ -d "data/$program_name/alerts/low" ]; then
                  for f in data/$program_name/alerts/low/*.md; do
                    [ -e "$f" ] || continue
                    TITLE_CAPTION=$(grep "^# " "$f" | head -n 1 | sed 's/# //g' | cut -c1-60)
                    curl -s -X POST "https://api.telegram.org/bot$TG_TOKEN/sendDocument" \
                      -F chat_id="$TG_GEN" \
                      -F document=@"$f" \
                      -F caption="⚠️ [$program_name] FOUND: $TITLE_CAPTION" > /dev/null 2>&1
                  done
                fi

                zip -qj "${program_name}_FULL_DATA.zip" data/$program_name/*.txt data/$program_name/*.json .seen_urls || true
                curl -s -F chat_id="$TG_DATA" -F document=@"${program_name}_FULL_DATA.zip" -F caption="📦 DATABASE: $program_name" "https://api.telegram.org/bot$TG_TOKEN/sendDocument" > /dev/null 2>&1
            fi
          fi

          # Hapus folder data setelah dikirim agar penyimpanan GitHub tetap lega
                rm -rf "data/$program_name"

      - name: Sync Database (Safe & Immortal)
        run: |
          git config --local user.email "bot@sniper-recon.ai"
          git config --local user.name "Recon-Sniper-Bot"
          
          # 1. Ambil perubahan dan commit lokal
          git add .seen_urls
          git commit -m "database: update logs [skip ci]" || echo "No changes"

          # 2. Loop Sync agar tidak tabrakan
          for i in {1..10}; do
            git pull origin main --rebase || git rebase --abort
            
            if [ -f .seen_urls ]; then
              sort -u .seen_urls -o .seen_urls
            fi
            
            git add .seen_urls
            git commit --amend --no-edit || echo "Nothing to amend"
            
            if git push origin main; then
              echo "✅ Database Synced Successfully!"
              break
            else
              echo "🔄 Collision detected, retrying in 15s..."
              sleep 15
            fi
          done
